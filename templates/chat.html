<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- CRITICAL FOR MOBILE: Tells mobile browsers to scale the layout properly -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chatbot</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    </head>
    
    <body>
        <!-- Cleaned up the structural layouts for a fluid height environment -->
        <div class="container-fluid chat-container">
            <div class="row justify-content-center h-100 align-items-center">      
                <div class="col-12 col-sm-10 col-md-8 col-xl-6 chat-wrapper">
                    <div class="card chat-card">
                        <div class="card-header msg_head">
                            <div class="d-flex bd-highlight align-items-center">
                                <div class="img_cont">
                                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img" alt="bot">
                                    <span class="online_icon"></span>
                                </div>
                                <div class="user_info">
                                    <span>Medical Chatbot</span>
                                    <p>Ask me anything!</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Added automatic scrolling anchors inside the script -->
                        <div id="messageFormeight" class="card-body msg_card_body"></div>
                        
                        <div class="card-footer">
                            <form id="messageArea" class="input-group">
                                <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
                                <div class="input-group-append">
                                    <button type="submit" id="send" class="input-group-text send_btn">
                                        <i class="fas fa-location-arrow"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script>
            $(document).ready(function() {
                // Smooth scrolling helper for dynamic screen heights
                function scrollToBottom() {
                    var chatBody = $("#messageFormeight");
                    chatBody.scrollTop(chatBody[0].scrollHeight);
                }

                $("#messageArea").on("submit", function(event) {
                    const date = new Date();
                    const hour = String(date.getHours()).padStart(2, '0');
                    const minute = String(date.getMinutes()).padStart(2, '0');
                    const str_time = hour + ":" + minute;
                    var rawText = $("#text").val();

                    var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">'+ str_time + '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';
                    
                    $("#text").val("");
                    $("#messageFormeight").append(userHtml);
                    scrollToBottom();

                    $.ajax({
                        data: { msg: rawText },
                        type: "POST",
                        url: "/get",
                    }).done(function(data) {
                        var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + data + '<span class="msg_time">' + str_time + '</span></div></div>';
                        $("#messageFormeight").append($.parseHTML(botHtml));
                        scrollToBottom();
                    });
                    event.preventDefault();
                });
            });
        </script>
    </body>
</html>
